[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    data: tests that require dataset files on disk
    slow: tests that take a long time (deep learning training, etc.)
    sklearn: tests using scikit-learn models
    keras: tests using Keras/TensorFlow models
    pytorch: tests using PyTorch models
    nlp: NLP pipeline tests
    cv: computer vision tests
    clustering: clustering tests
    timeseries: time series tests
    eda: EDA-only projects (no model)
    conceptual: conceptual/tutorial projects
addopts = -v --tb=short -q
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning
