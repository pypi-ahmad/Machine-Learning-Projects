name: ML Audit – Full Repository Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'   # weekly Monday 02:00 UTC

jobs:
  ml-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h for full repo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow nbformat nbconvert ipykernel pandas numpy scikit-learn
          pip install langchain langchain-core langchain-community langchain-ollama
          pip install plotly seaborn matplotlib lightgbm xgboost catboost optuna shap
          pip install PyYAML tqdm rich
          python -m ipykernel install --user --name ml-projects

      - name: Inject MLOps cells
        run: python inject_mlops_cell.py

      - name: Run full audit
        run: python -u master_audit.py --skip-inject
        env:
          PYTHONIOENCODING: utf-8
          ML_AUDIT_KERNEL: ml-projects

      - name: Validate scores
        run: |
          python -c "
          import json, sys
          s = json.load(open('reports/summary.json'))
          print(f'Total: {s[\"total_notebooks\"]}  Pass: {s[\"passed\"]}  Fail: {s[\"failed\"]}')
          print(f'Avg score: {s[\"avg_score\"]}  Production-ready: {s[\"production_ready\"]}')
          hard_fails = [r for r in s['ranking_asc'] if r.get('score',100) < 70]
          if hard_fails:
              print(f'HARD FAILURES ({len(hard_fails)}):')
              for h in hard_fails[:20]:
                  print(f'  {h[\"notebook\"]} score={h[\"score\"]}')
              sys.exit(1)
          print('ALL NOTEBOOKS PASSED MINIMUM THRESHOLD')
          "

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-audit-reports
          path: reports/

      - name: Upload MLflow DB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db

