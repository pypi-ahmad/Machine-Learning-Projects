name: ML Audit – Full Repository Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'   # weekly Monday 02:00 UTC

jobs:
  ml-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h for full repo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run full audit
        run: python -u master_audit.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-audit-reports
          path: reports/

