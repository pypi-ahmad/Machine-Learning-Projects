name: ML Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mlflow nbformat nbconvert ipykernel
          python -m ipykernel install --user --name python3
      - name: Run ML Audit
        run: python run_ml_audit.py
      - name: Check Scores
        run: |
          if [ -f reports/summary.json ]; then
            python -c "import json; summary = json.load(open('reports/summary.json')); print(f'Total Score: {summary[\"avg_score\"]}'); exit(1 if any(nb['score'] < 90 for nb in summary['ranking']) else 0)"
          else
            echo "Summary missing!"
            exit 1
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: ml-reports
          path: reports/
