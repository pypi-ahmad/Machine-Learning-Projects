# Business Card Reader — sample inference config
# Copy and edit for your use case.

# OCR settings
ocr_lang: en
use_gpu: false
det_db_thresh: 0.3
rec_batch_num: 6

# Validation
warn_missing_fields: true
required_fields:
  - name

# Export
export_json: ""
export_csv: ""

# Display
show_display: true
highlight_fields: true
show_ocr_boxes: false
line_width: 2

# Output
save_annotated: false
output_dir: output
