# ============================================================
# Deep Learning Projects Monorepo -- Conda Environment
# PyTorch-only (NO TensorFlow) | CUDA 13.0
# Requires: Python 3.11 (PyCaret compatibility)
# Usage:  conda env create -f environment.yml
#         conda activate dl-projects
# ============================================================
name: dl-projects
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip>=24.0

  # -- Core Deep Learning (CUDA 13.0) --
  - pytorch>=2.10.0
  - torchvision>=0.22.0
  - torchaudio>=2.10.0
  - pytorch-cuda=13.0

  # -- Data & Numeric --
  - numpy>=2.2.0
  - pandas>=2.2.3
  - scipy>=1.15.0

  # -- Visualization --
  - matplotlib>=3.10.0
  - seaborn>=0.13.2

  # -- Classical ML --
  - scikit-learn>=1.6.1

  # -- Utilities --
  - pyyaml>=6.0.2
  - tqdm>=4.67.0
  - requests>=2.32.0
  - pillow>=11.2.0

  # -- pip-only packages --
  - pip:
      # DL ecosystem
      - torchmetrics>=1.6.0
      - transformers>=4.51.0
      - datasets>=3.5.0
      - accelerate>=1.6.0
      - evaluate>=0.4.4
      - timm>=1.0.15
      - tokenizers>=0.21.0

      # AutoML (PyCaret requires Python 3.9-3.11)
      - pycaret>=3.5.0
      - lazypredict>=0.2.14

      # Boosting
      - xgboost>=3.0.0
      - lightgbm>=4.6.0
      - catboost>=1.2.7

      # CV
      - opencv-python>=4.12.0
      - albumentations>=2.0.0

      # NLP
      - nltk>=3.9.1
      - gensim>=4.3.0

      # Audio
      - librosa>=0.10.2
      - soundfile>=0.13.1

      # RL
      - gymnasium>=1.1.0

      # Association rules
      - mlxtend>=0.23.4

      # Data download
      - opendatasets>=0.1.22
      - kaggle>=1.7.4
      - gdown>=5.2.0

      # Experiment tracking (optional)
      - mlflow>=2.19.0
      - wandb>=0.19.0

      # Misc
      - plotly>=5.24.0
      - python-dotenv>=1.0.0
      - ipywidgets>=8.1.0
